name: GojiBot 前向监控

on:
  schedule:
    - cron: "7 * * * *"   # 每小时第7分钟（UTC），等1h K线收盘后运行
  workflow_dispatch: {}

concurrency:
  group: gojibot-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: TG 通道测试（临时，验证后删除本步骤）
        if: github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.GOJI_TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.GOJI_TG_CHAT_ID }}
        run: python3 gojibot/tg.py test

      - name: Run monitor
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          # GojiBot 专属 TG（与 F6 频道完全分离）。未配置时不发任何 TG，只写日志。
          TELEGRAM_BOT_TOKEN: ${{ secrets.GOJI_TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.GOJI_TG_CHAT_ID }}
        run: python3 gojibot/monitor.py

      - name: Commit forward state
        run: |
          git config user.name "gojibot-actions"
          git config user.email "actions@users.noreply.github.com"
          git add gojibot/forward
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "gojibot: forward state update"
          # F6 机器人每15分钟也在推提交，这里 rebase 重试避免撞车
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            git pull --rebase
          done
          echo "push failed after retries"
          exit 1
