name: 查chat_id (临时)

on:
  workflow_dispatch: {}

jobs:
  getid:
    runs-on: ubuntu-latest
    steps:
      - name: getUpdates
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          curl -s "https://api.telegram.org/bot$TG/getUpdates?allowed_updates=%5B%22message%22%2C%22my_chat_member%22%5D" > /tmp/u.json
          python3 - <<'PY'
          import json
          d = json.load(open('/tmp/u.json'))
          print('ok =', d.get('ok'), ' updates =', len(d.get('result', [])))
          seen = set()
          for u in d.get('result', []):
              for k in ('my_chat_member', 'message', 'channel_post'):
                  if k in u and 'chat' in u[k]:
                      c = u[k]['chat']
                      key = c.get('id')
                      if key in seen:
                          continue
                      seen.add(key)
                      print(f"event={k} type={c.get('type')} id={c.get('id')} title={(c.get('title') or '')[:10]}")
          PY
