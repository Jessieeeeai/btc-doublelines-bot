name: F6 信号机器人

on:
  schedule:
    # 兜底: 每 30 分钟一次 (GitHub 实际可能延迟到 1-2h, 仅作 backup)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发, 方便调试
  repository_dispatch:
    types: [check-signals]  # 外部触发器 (cron-job.org) 每 20 分钟调一次

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来 commit state.json 回来

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal bot (3 strategies race)
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 signal_bot_race.py

      - name: Commit state files if changed
        run: |
          if [ -n "$(git status --porcelain state_A.json state_B.json state_C.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_A.json state_B.json state_C.json 2>/dev/null || true
            git commit -m "update race states $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "state files unchanged, no commit needed"
          fi
