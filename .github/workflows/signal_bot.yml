name: F6 信号机器人

on:
  schedule:
    # 兜底: 每 30 分钟一次 (GitHub 实际可能延迟到 1-2h, 仅作 backup)
    - cron: '*/30 * * * *'
  workflow_dispatch:  # 允许手动触发, 方便调试
  repository_dispatch:
    types: [check-signals]  # 外部触发器 (cron-job.org) 每 20 分钟调一次

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来 commit state.json 回来

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps (matplotlib for 关单战报出图)
        run: pip install --quiet matplotlib

      - name: Run signal bot (3 strategies race)
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }},-1003953373413
        run: |
          python3 signal_bot_race.py

      - name: Commit state files if changed
        run: |
          if [ -n "$(git status --porcelain state_A.json state_B.json state_C.json signals_feed.json 2>/dev/null)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state_A.json state_B.json state_C.json signals_feed.json 2>/dev/null || true
            git commit -m "update race states $(date -u +'%Y-%m-%d %H:%M UTC')"
            # 防 push race (并发触发导致 non-fast-forward): pull --rebase 后重试
            pushed=0
            for attempt in 1 2 3 4 5; do
              if git push; then pushed=1; break; fi
              echo "push 被拒 (第 $attempt 次), pull --rebase 后重试..."
              git pull --rebase --autostash origin main || true
              sleep $((RANDOM % 5 + 2))
            done
            if [ "$pushed" != "1" ]; then
              echo "::warning::5 次重试后仍无法 push state, 本轮放弃 (下轮会重新检测)"
            fi
          else
            echo "state files unchanged, no commit needed"
          fi
