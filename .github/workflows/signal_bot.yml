name: F6 信号机器人

on:
  schedule:
    # 每 5 分钟跑一次 (UTC 时间)。GitHub Actions cron 最快 5 分钟
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允许手动触发, 方便调试

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来 commit state.json 回来

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run signal bot
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 signal_bot.py

      - name: Commit state.json if changed
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "state.json unchanged, no commit needed"
          fi
