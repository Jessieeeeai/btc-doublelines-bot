name: 样例战报 (手动触发)

on:
  workflow_dispatch:

jobs:
  send-sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install --quiet matplotlib
      - name: Send sample trade reports
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }},-1003953373413
        run: python3 research/send_sample_report.py
