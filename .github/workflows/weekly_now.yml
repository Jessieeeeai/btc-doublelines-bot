name: 手动周报 (战绩汇总)

on:
  workflow_dispatch:

jobs:
  send-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Send weekly summary now
        env:
          COINGLASS_API_KEY: ${{ secrets.COINGLASS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }},-1003953373413
        run: python3 research/send_weekly_now.py
